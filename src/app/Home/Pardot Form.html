<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
font-family:Roboto,sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc,#eef2ff);
background-size:200% 200%;
animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

/* FORM WRAPPER */

.form-wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:40px 20px;
}

/* CARD */

.form-card{
width:100%;
max-width:720px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
border-radius:18px;
padding:45px;
box-shadow:0 25px 60px rgba(0,0,0,0.15);
position:relative;
overflow:hidden;
}

/* GLOW BORDER */

.form-card:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,#2B7EC2,#BE0010,#2B7EC2);
animation:move 6s linear infinite;
}

@keyframes move{
0%{background-position:0}
100%{background-position:400px}
}

/* TITLE */

.form-title{
text-align:center;
font-size:28px;
font-weight:700;
margin-bottom:25px;
color:#222;
}

/* STEP INDICATORS */

.step-indicators{
display:flex;
justify-content:center;
gap:14px;
margin-bottom:25px;
}

.circle{
width:36px;
height:36px;
border-radius:50%;
background:#e5e5e5;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
color:#777;
transition:0.3s;
}

.circle.active{
background:#2B7EC2;
color:white;
transform:scale(1.15);
box-shadow:0 6px 20px rgba(43,126,194,0.4);
}

/* PROGRESS BAR */

.progress-bar{
height:6px;
background:#eee;
border-radius:20px;
margin-bottom:35px;
overflow:hidden;
}

.progress{
height:100%;
width:33%;
background:linear-gradient(90deg,#2B7EC2,#BE0010);
transition:0.4s;
}

/* STEPS */

.step{
display:none;
animation:fade 0.4s ease;
}

.step.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateX(20px)}
to{opacity:1;transform:translateX(0)}
}

/* FIELD */

.field{
position:relative;
margin-bottom:24px;
}

.field i{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:#aaa;
font-size:14px;
}

.field input{
width:100%;
padding:15px 14px 15px 44px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
transition:0.25s;
}

.field input:focus{
border-color:#2B7EC2;
box-shadow:0 0 0 3px rgba(43,126,194,0.15);
outline:none;
}

/* VALID STATE */

.field input.valid{
border-color:#28a745;
}

/* BUTTONS */

.button-row{
display:flex;
justify-content:space-between;
margin-top:25px;
}

.btn{
padding:13px 26px;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
transition:0.25s;
position:relative;
overflow:hidden;
}

/* RIPPLE EFFECT */

.btn:after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,0.4);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:0.4s;
}

.btn:active:after{
width:200px;
height:200px;
}

/* NEXT */

.next-btn{
background:#2B7EC2;
color:white;
}

.next-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(43,126,194,0.35);
}

/* PREV */

.prev-btn{
background:#ddd;
}

/* SUBMIT */

.submit-btn{
background:#BE0010;
color:white;
width:100%;
font-size:16px;
margin-top:10px;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(190,0,16,0.35);
}

/* SUCCESS MESSAGE */

.success-message{
display:none;
text-align:center;
padding:40px;
}

.success-message i{
font-size:60px;
color:#28a745;
margin-bottom:10px;
animation:successpop 0.5s ease;
}

@keyframes successpop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

</style>



<div class="form-wrapper">

<div class="form-card">

<div class="form-title">Request Product Information</div>

<div class="step-indicators">
<div class="circle active">1</div>
<div class="circle">2</div>
<div class="circle">3</div>
</div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>


<form id="leadForm" action="http://go.inkarp.co.in/l/1089472/2026-03-04/bljpnr" method="post">

<!-- STEP 1 -->

<div class="step active">

<div class="field">
<i class="fa fa-user"></i>
<input type="text" name="First Name" placeholder="First Name" required>
</div>

<div class="field">
<i class="fa fa-user"></i>
<input type="text" name="Last Name" placeholder="Last Name">
</div>

<div class="field">
<i class="fa fa-envelope"></i>
<input type="email" name="Email" placeholder="Email Address" required>
</div>

<div class="button-row">
<button type="button" class="btn next-btn">Next</button>
</div>

</div>


<!-- STEP 2 -->

<div class="step">

<div class="field">
<i class="fa fa-building"></i>
<input type="text" name="Company Name" placeholder="Company Name">
</div>

<div class="field">
<i class="fa fa-briefcase"></i>
<input type="text" name="Designation" placeholder="Designation">
</div>

<div class="field">
<i class="fa fa-sitemap"></i>
<input type="text" name="Department" placeholder="Department">
</div>

<div class="button-row">
<button type="button" class="btn prev-btn">Back</button>
<button type="button" class="btn next-btn">Next</button>
</div>

</div>


<!-- STEP 3 -->

<div class="step">

<div class="field">
<i class="fa fa-phone"></i>
<input type="tel" name="Contact" placeholder="Phone Number">
</div>

<div class="field">
<i class="fa fa-industry"></i>
<input type="text" name="Industry" placeholder="Industry">
</div>

<div class="field">
<i class="fa fa-map-marker-alt"></i>
<input type="text" name="State" placeholder="State">
</div>

<div class="field">
<i class="fa fa-location-dot"></i>
<input type="text" name="City" placeholder="City">
</div>

<input type="hidden" name="product_interest" value="Rotary Evaporator">

<div class="button-row">
<button type="button" class="btn prev-btn">Back</button>

<button type="submit" class="btn submit-btn">
<i class="fa fa-paper-plane"></i> Submit Enquiry
</button>
</div>

</div>

</form>


<div class="success-message" id="successMessage">

<i class="fa fa-circle-check"></i>

<h3>Thank You!</h3>

<p>Your enquiry has been successfully submitted.</p>

</div>

</div>
</div>



<script>

const steps=document.querySelectorAll(".step")
const circles=document.querySelectorAll(".circle")
const nextBtns=document.querySelectorAll(".next-btn")
const prevBtns=document.querySelectorAll(".prev-btn")
const progress=document.getElementById("progress")

let currentStep=0

function updateSteps(){

steps.forEach((step,index)=>{
step.classList.toggle("active",index===currentStep)
})

circles.forEach((circle,index)=>{
circle.classList.toggle("active",index<=currentStep)
})

progress.style.width=((currentStep+1)/steps.length)*100+"%"

}

function validateStep(){

const inputs=steps[currentStep].querySelectorAll("input[required]")

for(let input of inputs){

if(!input.value){
input.focus()
return false
}

}

return true
}

nextBtns.forEach(btn=>{
btn.addEventListener("click",()=>{
if(!validateStep()) return
currentStep++
updateSteps()
})
})

prevBtns.forEach(btn=>{
btn.addEventListener("click",()=>{
currentStep--
updateSteps()
})
})

document.getElementById("leadForm").addEventListener("submit",function(){
document.getElementById("successMessage").style.display="block"
})

</script>
